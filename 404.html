<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Harshavardhan Malve</title>
    <!-- ─── Favicon ─── -->
    <link rel="icon" href="images/letter-h-icon.png" type="image/png">
    <!-- ─── Fonts ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- ─── Styles ─── -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-2xl);
            background: var(--color-bg);
            color: var(--color-text);
        }
        .error-content h1 {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-gradient-1), var(--color-gradient-2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-md);
            line-height: 1;
        }
        .error-content h2 {
            font-size: var(--font-2xl);
            margin-bottom: var(--space-lg);
        }
        .error-content p {
            color: var(--color-text-muted);
            margin-bottom: var(--space-2xl);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content anim-fade-up visible">
            <h1>404</h1>
            <h2>Oops! Page Not Found</h2>
            <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="index.html" class="btn btn-primary">Return Home</a>
        </div>
    </div>
    <script>
        // Set theme from local storage if exists
        const html = document.documentElement;
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            html.setAttribute('data-theme', currentTheme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
