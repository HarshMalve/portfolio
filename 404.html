<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Harshavardhan Malve</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="images/letter-h-icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#1A1C19;
            --cream:#F4F0EA;
            --cream-muted:rgba(244,240,234,0.45);
            --sage:#6B7F5E;
            --sage-hover:#5A6D4F;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:var(--bg);
            color:var(--cream);
            font-family:'Inter','Helvetica Neue',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:24px;
            -webkit-font-smoothing:antialiased;
        }
        a{color:inherit;text-decoration:none}
        .error-content h1{
            font-family:'Playfair Display',Georgia,serif;
            font-size:clamp(6rem,15vw,12rem);
            line-height:1;
            letter-spacing:-.04em;
            margin-bottom:16px;
        }
        .error-content p{
            font-size:1.125rem;
            color:var(--cream-muted);
            font-weight:300;
            margin-bottom:48px;
        }
        .btn-back{
            display:inline-block;
            padding:18px 48px;
            background:var(--sage);
            color:var(--cream);
            font-size:.8125rem;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:.18em;
            transition:background .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1);
        }
        .btn-back:hover{
            background:var(--sage-hover);
            transform:translateY(-2px);
            opacity:1;
        }
    </style>
</head>
<body>
    <div class="error-content">
        <h1>404</h1>
        <p>The page you are looking for does not exist.</p>
        <a href="index.html" class="btn-back">Return Home</a>
    </div>
</body>
</html>
